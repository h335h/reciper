# Pre-commit configuration for Reciper
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        args: [--strict, --ignore-missing-imports]
        exclude: ^tests/

  # Black formatting - using ruff-format instead which is faster
  # but keeping black as backup
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.10

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: ^tests/

  # Ensure imports are sorted
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Commit message validation
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.5.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # Check for common security issues in dependencies
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: ^tests/

  # Check for dependency vulnerabilities
  - repo: https://github.com/pyupio/safety
    rev: 2.3.5
    hooks:
      - id: safety
        args: ["check", "--file", "requirements.txt"]

  # Validate GitHub Actions workflows
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.27.3
    hooks:
      - id: check-github-actions
      - id: check-github-workflows

# Default configuration
default_language_version:
  python: python3.10

default_stages: [commit, push]

# Files to exclude from all hooks
exclude: |
  (?x)^(
    \.git|
    \.mypy_cache|
    \.pytest_cache|
    __pycache__|
    \.venv|
    venv|
    env|
    dist|
    build|
    \.eggs|
    \.tox|
    \.ruff_cache|
    node_modules|
    \.next|
    \.nuxt|
    out|
    coverage|
    \.coverage|
    \.nyc_output|
    \.next|
    \.nuxt|
    \.vscode|
    \.idea|
    \*.min\.[a-z]+|
    \*.map|
    \*.snap|
    \*.svg|
    \*.ico|
    \*.jpg|
    \*.jpeg|
    \*.png|
    \*.gif|
    \*.webp|
    \*.woff2?|
    \*.ttf|
    \*.eot|
    \*.otf|
    \*.pdf|
    \*.zip|
    \*.tar\.[a-z]+|
    \*.pyc|
    \*.pyo|
    \*.pyd|
    \*.so|
    \*.dll|
    \*.exe|
    \*.bin|
    \*.dat|
    \*.db|
    \*.sqlite3|
    \*.log|
    \*.lock|
    \*.cache|
    \*.tmp|
    \*.temp|
    \*.swp|
    \*.swo|
    \*~|
    \#*|
    \.#*|
    Dockerfile|
    \.dockerignore|
    environment\.yml|
    requirements\.txt|
    examples/.*|
    json/.*
  )