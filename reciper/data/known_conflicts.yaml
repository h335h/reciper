# Known package conflicts for Reciper Conflict Detector
# This file contains known compatibility issues between packages
# Used by conflict_detector.py to warn users about potential issues

known_conflicts:
  # Python version range conflicts
  - packages: ["python", "tensorflow"]
    min_python: "3.8"
    max_python: "3.10"
    conflict_type: "version_range"
    message: "TensorFlow 2.x requires Python 3.8-3.10"
    severity: "error"
    
  - packages: ["python", "tensorflow"]
    min_python: "3.8"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "TensorFlow 2.13+ supports Python 3.8-3.11"
    severity: "warning"
    
  - packages: ["python", "pytorch"]
    min_python: "3.8"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "PyTorch 2.0+ requires Python 3.8-3.11"
    severity: "warning"

  # Package pair incompatibilities
  - packages: ["braker", "augustus"]
    incompatible_versions:
      - braker: ">=3.0"
        augustus: "<3.4"
    conflict_type: "package_pair"
    message: "BRAKER 3.0+ requires Augustus 3.4+"
    severity: "error"
    
  - packages: ["numpy", "scipy"]
    incompatible_versions:
      - numpy: "<1.21.0"
        scipy: ">=1.8.0"
    conflict_type: "package_pair"
    message: "SciPy 1.8.0+ requires NumPy 1.21.0+"
    severity: "error"
    
  - packages: ["pandas", "numpy"]
    incompatible_versions:
      - pandas: ">=2.0.0"
        numpy: "<1.21.0"
    conflict_type: "package_pair"
    message: "pandas 2.0.0+ requires NumPy 1.21.0+"
    severity: "error"

  # Recommended version pairs
  - packages: ["numpy", "pandas"]
    recommended_pair:
      numpy: ">=1.21.0"
      pandas: ">=1.3.0"
    conflict_type: "recommendation"
    message: "For optimal performance, use numpy>=1.21.0 with pandas>=1.3.0"
    severity: "warning"
    
  - packages: ["matplotlib", "numpy"]
    recommended_pair:
      matplotlib: ">=3.5.0"
      numpy: ">=1.21.0"
    conflict_type: "recommendation"
    message: "Matplotlib 3.5.0+ works best with NumPy 1.21.0+"
    severity: "warning"

  # Bioinformatic tool conflicts
  - packages: ["samtools", "htslib"]
    incompatible_versions:
      - samtools: ">=1.15"
        htslib: "<1.15"
    conflict_type: "package_pair"
    message: "samtools 1.15+ requires htslib 1.15+"
    severity: "error"
    
  - packages: ["bcftools", "htslib"]
    incompatible_versions:
      - bcftools: ">=1.15"
        htslib: "<1.15"
    conflict_type: "package_pair"
    message: "bcftools 1.15+ requires htslib 1.15+"
    severity: "error"

  # Common Python package conflicts
  - packages: ["django", "python"]
    min_python: "3.8"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "Django 4.0+ requires Python 3.8-3.11"
    severity: "warning"
    
  - packages: ["flask", "werkzeug"]
    incompatible_versions:
      - flask: ">=2.3.0"
        werkzeug: "<2.3.0"
    conflict_type: "package_pair"
    message: "Flask 2.3.0+ requires Werkzeug 2.3.0+"
    severity: "error"

  # Data science stack recommendations
  - packages: ["scikit-learn", "numpy"]
    recommended_pair:
      scikit-learn: ">=1.2.0"
      numpy: ">=1.17.3"
    conflict_type: "recommendation"
    message: "scikit-learn 1.2.0+ recommends NumPy 1.17.3+"
    severity: "warning"
    
  - packages: ["jupyter", "tornado"]
    incompatible_versions:
      - jupyter: ">=4.0"
        tornado: "<6.0"
    conflict_type: "package_pair"
    message: "Jupyter 4.0+ requires Tornado 6.0+"
    severity: "error"

  # Visualization package conflicts
  - packages: ["plotly", "python"]
    min_python: "3.7"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "Plotly 5.0+ requires Python 3.7-3.11"
    severity: "warning"
    
  - packages: ["seaborn", "matplotlib"]
    recommended_pair:
      seaborn: ">=0.12.0"
      matplotlib: ">=3.5.0"
    conflict_type: "recommendation"
    message: "Seaborn 0.12.0+ works best with Matplotlib 3.5.0+"
    severity: "warning"

  # Development tool conflicts
  - packages: ["black", "python"]
    min_python: "3.7"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "Black 23.0+ requires Python 3.7-3.11"
    severity: "warning"
    
  - packages: ["mypy", "python"]
    min_python: "3.7"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "mypy 1.0+ requires Python 3.7-3.11"
    severity: "warning"

  # Testing framework conflicts
  - packages: ["pytest", "python"]
    min_python: "3.7"
    max_python: "3.11"
    conflict_type: "version_range"
    message: "pytest 7.0+ requires Python 3.7-3.11"
    severity: "warning"

# Note: Users can add their own conflicts by editing this file
# The conflict detector will automatically load any new entries